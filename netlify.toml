[build]
  command = "pnpm run build"
  publish = "dist/public"

# SEO meta tags are baked into pre-rendered HTML pages at build time
# Edge function inject-meta.ts handles dynamic meta tag injection for all routes

# Serve static files directly (before SPA catch-all)
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/llms.txt"
  to = "/llms.txt"
  status = 200

[[redirects]]
  from = "/llms-full.txt"
  to = "/llms-full.txt"
  status = 200

[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# ============================================================
# Pre-rendered pages: serve their own index.html files
# These MUST come before the SPA catch-all so crawlers get
# the correct title, description, canonical URL, and structured data
# ============================================================

